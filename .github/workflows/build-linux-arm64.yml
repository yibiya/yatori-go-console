# Lightweight CI for this host (aarch64): frontend + linux-arm64 binary only.
name: Build linux-arm64

on:
  workflow_dispatch:
  push:
    branches:
      - feature/ui-polish

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc-aarch64-linux-gnu

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile || pnpm install
          pnpm build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go mod
        run: |
          go env -w GOSUMDB=off
          go mod tidy

      - name: Build linux/arm64
        run: |
          mkdir -p dist
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o dist/yatori ./main.go
          mkdir -p dist/assets
          cp -r frontend/out dist/assets/web
          file dist/yatori
          ls -lh dist/yatori

      - uses: actions/upload-artifact@v4
        with:
          name: yatori-linux-arm64
          path: dist/
          retention-days: 7
